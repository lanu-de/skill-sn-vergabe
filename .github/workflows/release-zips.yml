name: Skill-Zips bei Release

# Baut bei jedem veröffentlichten GitHub-Release je Skill-Ordner ein Zip
# (Wurzel = Skill-Ordner mit SKILL.md, passend für den Upload auf claude.ai)
# und hängt die Zips als Download-Dateien an die Release-Seite an.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  zips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Release-Tag gegen Plugin-Version prüfen
        run: |
          tag="${{ github.event.release.tag_name }}"
          version=$(jq -r .version .claude-plugin/plugin.json)
          if [ "${tag#v}" != "$version" ]; then
            echo "::error::Release-Tag '$tag' passt nicht zur Version '$version' in .claude-plugin/plugin.json — bitte Version angleichen und Release neu anlegen."
            exit 1
          fi
          echo "Tag $tag passt zur Plugin-Version $version."

      - name: Skill-Zips bauen
        run: |
          mkdir -p dist
          for skill in skills/*/; do
            name=$(basename "$skill")
            (cd skills && zip -r "../dist/${name}.zip" "$name")
          done
          ls -l dist

      - name: Zips an das Release anhängen
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber
